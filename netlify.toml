[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"
  # Same-origin /api — proxied below (avoids CORS in the browser)
  VITE_API_BASE_URL = ""

# Proxy API calls to Railway backend
[[redirects]]
  from = "/api/*"
  to = "https://grocery-app-env.up.railway.app/api/:splat"
  status = 200
  force = true

# React Router — SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
